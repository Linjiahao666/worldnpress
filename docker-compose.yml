services:
  worldnpress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldnpress
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库和上传文件
      - worldnpress-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # 可以在这里添加其他环境变量
      # - NUXT_PUBLIC_API_BASE=https://yourdomain.com
    networks:
      - worldnpress-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: worldnpress-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./letsencrypt-webroot:/var/www/letsencrypt
    depends_on:
      - worldnpress
    networks:
      - worldnpress-network

  # Let's Encrypt 证书自动续期（每12小时检查一次）
  certbot:
    image: certbot/certbot
    container_name: worldnpress-certbot
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./letsencrypt-webroot:/var/www/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command:
      [
        "trap exit TERM; while :; do certbot renew --webroot -w /var/www/letsencrypt; sleep 12h & wait $${!}; done",
      ]

volumes:
  worldnpress-data:
    driver: local

networks:
  worldnpress-network:
    driver: bridge
