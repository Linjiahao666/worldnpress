upstream worldnpress {
    server worldnpress:3000;
}

# 初始化配置：仅 HTTP，用于首次申请 Let's Encrypt 证书
# 申请成功后切换回 nginx.conf（包含 HTTPS）
server {
    listen 80;
    server_name worldnpress.com www.worldnpress.com;

    client_max_body_size 10m;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 临时反代：证书申请期间网站仍可访问
    location / {
        proxy_pass http://worldnpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
