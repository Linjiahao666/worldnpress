# ============================================================
# WorldnPress Docker Compose
# Nginx（反向代理 + SSL）+ Certbot（证书管理）
# Nuxt 应用通过 pm2 原生运行在宿主机，不再 Docker 构建
# ============================================================

services:
  # Nginx 反向代理（反代宿主机 :3000 的 Nuxt 服务）
  nginx:
    image: nginx:alpine
    container_name: worldnpress-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./letsencrypt-webroot:/var/www/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - worldnpress-network

  # Let's Encrypt 证书（按需启动）
  certbot:
    image: certbot/certbot
    container_name: worldnpress-certbot
    profiles:
      - ssl
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./letsencrypt-webroot:/var/www/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command:
      [
        "trap exit TERM; while :; do certbot renew --webroot -w /var/www/letsencrypt; sleep 12h & wait $${!}; done",
      ]

networks:
  worldnpress-network:
    driver: bridge
